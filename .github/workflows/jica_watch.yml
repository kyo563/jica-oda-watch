name: jica-watch

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      write_sheets:
        description: 'Write results to Google Sheets'
        required: false
        default: 'false'

jobs:
  run-watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python scripts/validate_config.py
      - run: python scripts/crawl_jica.py --watchlist config/watchlist.example.csv --output data/raw/latest.json
      - run: python scripts/diff_records.py --previous data/snapshots/previous.json --current data/raw/latest.json --output site/data/projects.json
      - name: Plan Google Sheets update
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.write_sheets != 'true' }}
        run: python scripts/update_sheets.py --input site/data/projects.json --dry-run
      - name: Write Google Sheets update
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.write_sheets == 'true' }}
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python scripts/update_sheets.py --input site/data/projects.json
      - run: pytest -q
